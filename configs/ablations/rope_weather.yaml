model:
  variant: rope
  d_model: 64
  n_heads: 4
  n_layers: 3
  d_ff: 256
  patch_length: 16
  dropout: 0.1

training:
  pretrain_epochs: 50
  finetune_epochs: 30
  pretrain_lr: 0.0001
  finetune_lr: 0.00005
  batch_size: 32
  seed: 42
  patience: 10

data:
  dataset: Weather
  path: data/raw/weather/weather.csv
  context_length: 336
  horizon: 96
  patch_length: 16
  train_split: 0.7
  val_split: 0.1
  finetune_stride: 8
